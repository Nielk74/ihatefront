<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STAR - Deployments status mock</title>
    <link rel="stylesheet" href="dist/ihatefront.css">
    <script type="module" src="dist/ihatefront.js"></script>
    <style>
        :root {
            --ih-font-sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            --ih-font-mono: "Fira Code", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            --ih-canvas: #f4f7fb;
            --ih-surface: #ffffff;
            --ih-surface-subtle: #f7f9fc;
            --ih-border: #d8e2ef;
            --ih-border-strong: #b7c7d9;
            --ih-text: #172033;
            --ih-muted: #65738a;
            --ih-muted-strong: #43516a;
            --ih-primary: #1e40af;
            --ih-primary-soft: #dbeafe;
            --ih-primary-border: #93c5fd;
            --ih-success: #15803d;
            --ih-warning: #d97706;
            --ih-danger: #dc2626;
            --ih-info: #2563eb;
            --ih-focus: 0 0 0 3px rgba(37, 99, 235, 0.22);
            --ih-container: 1320px;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(219, 234, 254, 0.62), transparent 19rem),
                var(--ih-canvas);
        }

        .ih-main {
            background: transparent;
        }

        .ops-page {
            min-height: 100vh;
        }

        .ih-dashboard-header {
            gap: 1rem;
            padding: 1.15rem clamp(1rem, 2.4vw, 2rem) 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(248, 250, 252, 0.86);
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.06);
        }

        .ops-header-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(22rem, 34rem);
            gap: 1rem;
            width: min(100%, var(--ih-container));
            margin-inline: auto;
        }

        .ih-dashboard-header__top {
            align-items: center;
        }

        .ih-dashboard-header__meta {
            align-items: center;
        }

        .ih-title {
            font-size: clamp(1.45rem, 1.15rem + 1vw, 2.35rem);
            font-weight: 800;
        }

        .ih-kicker {
            color: #1e40af;
            letter-spacing: 0;
        }

        .ops-agent-panel {
            display: grid;
            gap: 0.75rem;
            align-self: stretch;
            padding: 0.9rem;
            border: 1px solid rgba(220, 38, 38, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        .ops-agent-panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .ops-agent-panel__title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--ih-text);
            font-size: 0.8125rem;
            font-weight: 850;
        }

        .ops-agent-panel__meta {
            color: var(--ih-muted);
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .ops-agent-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
            gap: 0.45rem;
            max-height: 8.5rem;
            overflow: auto;
        }

        .ops-agent-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 2rem;
            padding: 0 0.55rem;
            border: 1px solid #fecaca;
            border-radius: 7px;
            background: #fff1f1;
            color: #7f1d1d;
            font-family: var(--ih-font-mono);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .ops-bad-icon {
            position: relative;
            display: inline-grid;
            place-items: center;
            width: 1rem;
            height: 1rem;
            flex: 0 0 1rem;
            border: 1px solid #ef4444;
            border-radius: 999px;
            color: #dc2626;
        }

        .ops-bad-icon::before,
        .ops-bad-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0.48rem;
            height: 1.5px;
            border-radius: 999px;
            background: currentColor;
            transform-origin: center;
        }

        .ops-bad-icon::before { transform: translate(-50%, -50%) rotate(45deg); }
        .ops-bad-icon::after { transform: translate(-50%, -50%) rotate(-45deg); }

        .ops-content {
            padding-top: 1.25rem;
        }

        .ops-filter-panel {
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
        }

        .ops-filter-panel__label {
            color: var(--ih-muted);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .ops-filter-panel {
            display: grid;
            gap: 0.7rem;
            padding: 0.85rem;
        }

        .ops-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }

        .ops-filter-btn {
            min-height: 2rem;
            --ih-btn-bg: var(--ops-filter-bg, #ffffff);
            --ih-btn-border: var(--ops-filter-border, var(--ih-border));
            --ih-btn-color: var(--ops-filter-color, var(--ih-muted-strong));
            --ih-btn-hover: var(--ops-filter-hover, var(--ops-filter-bg, #f8fafc));
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 750;
        }

        .ops-filter-btn[data-status-filter="success"] {
            --ops-filter-bg: #e7f8ee;
            --ops-filter-border: #8fd8aa;
            --ops-filter-color: #166534;
            --ops-filter-hover: #d7f2e2;
        }

        .ops-filter-btn[data-status-filter="partial"] {
            --ops-filter-bg: #fff1d6;
            --ops-filter-border: #f4c76f;
            --ops-filter-color: #92400e;
            --ops-filter-hover: #ffe8bd;
        }

        .ops-filter-btn[data-status-filter="building"] {
            --ops-filter-bg: #dfeaff;
            --ops-filter-border: #9ab8f5;
            --ops-filter-color: #1d4ed8;
            --ops-filter-hover: #d2e1ff;
        }

        .ops-filter-btn[data-status-filter="failure"] {
            --ops-filter-bg: #fde4e4;
            --ops-filter-border: #f5a3a3;
            --ops-filter-color: #991b1b;
            --ops-filter-hover: #fbd2d2;
        }

        .ops-filter-btn[data-status-filter="unknown"] {
            --ops-filter-bg: #e8edf4;
            --ops-filter-border: #b8c4d4;
            --ops-filter-color: #475569;
            --ops-filter-hover: #dde5ef;
        }

        .ops-filter-btn[aria-pressed="true"] {
            box-shadow: inset 0 0 0 2px var(--ops-filter-color, var(--ih-primary));
        }

        .ops-search {
            width: 100%;
            min-height: 2.35rem;
            border: 1px solid var(--ih-border);
            border-radius: 8px;
            background: #ffffff;
            color: var(--ih-text);
            font: inherit;
            font-size: 0.85rem;
            padding: 0 0.75rem;
        }

        .ops-search:focus {
            border-color: var(--ih-primary-border);
            box-shadow: var(--ih-focus);
            outline: none;
        }

        .ih-section {
            gap: 0.8rem;
            padding-block: 1.4rem;
        }

        .ih-section + .ih-section {
            margin-top: 0.35rem;
            border-top: 1px solid rgba(148, 163, 184, 0.25);
        }

        .ih-env-header {
            padding: 0 0.1rem;
        }

        .ih-heading {
            font-size: 1.05rem;
            font-weight: 800;
        }

        .ops-deploy-summary {
            display: grid;
            gap: 0.35rem;
            padding: 0.85rem;
            border: 1px solid var(--ih-border);
            border-radius: 8px;
            background: #f8fafc;
            color: var(--ih-muted-strong);
            font-size: 0.8125rem;
        }

        .ops-deploy-summary strong {
            color: var(--ih-text);
        }

        .ih-table-wrap {
            border-color: rgba(148, 163, 184, 0.24);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.07);
        }

        .ih-table {
            min-width: var(--ops-env-table-min-width, 1240px);
            font-size: 0.78rem;
        }

        .ih-status-table {
            table-layout: fixed;
        }

        .ih-table th {
            background: #f8fafc;
            color: #475569;
            letter-spacing: 0;
            text-align: center;
            white-space: nowrap;
        }

        .ih-table td {
            height: 4.35rem;
            text-align: center;
        }

        .ih-status-table th:not(:last-child) {
            font-size: 0.72rem;
        }

        .ih-status-table td:not(:last-child) {
            font-size: 0.84rem;
        }

        .ih-status-table td {
            vertical-align: middle;
        }

        .ih-status-table th:first-child,
        .ih-status-table td:first-child {
            padding-left: clamp(1rem, 1vw, 1.35rem);
        }

        .ih-status-table tbody tr {
            --ih-row-bg: #ffffff;
            transition: box-shadow 0.18s ease;
        }

        .ih-status-table tbody tr:hover {
            background: var(--ih-row-bg);
            box-shadow: inset 4px 0 0 var(--ih-row-accent), inset 0 0 0 999px rgba(255, 255, 255, 0.08);
        }

        .ih-status-table tbody tr.is-success {
            --ih-row-bg: #e7f8ee;
        }

        .ih-status-table tbody tr.is-partial {
            --ih-row-bg: #fff1d6;
        }

        .ih-status-table tbody tr.is-building {
            --ih-row-bg: #dfeaff;
        }

        .ih-status-table tbody tr.is-failure {
            --ih-row-bg: #fde4e4;
        }

        .ih-status-table tbody tr.is-unknown {
            --ih-row-bg: #e8edf4;
        }

        .ih-status-icon::before,
        .ih-status-icon::after {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
        }

        .ih-status-icon--success::before {
            transform: translate(-50%, -50%);
        }

        .ih-status-icon--partial::before {
            transform: translate(-50%, -50%);
        }

        .ih-status-icon--failure::before {
            transform: translate(-50%, -50%);
        }

        .ih-status-icon--unknown::before {
            transform: translate(-50%, -50%);
        }

        .ih-server-name {
            font-size: 0.92rem;
        }

        .ops-server-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-width: 8rem;
        }

        .ops-stack-cell {
            display: grid;
            gap: 0.22rem;
            min-width: 8.4rem;
            width: fit-content;
            margin-inline: auto;
            text-align: left;
        }

        .ops-field-line {
            display: grid;
            grid-template-columns: 3.45rem minmax(0, 1fr);
            align-items: baseline;
            gap: 0.45rem;
        }

        .ops-field-label {
            color: var(--ih-muted);
            font-size: 0.67rem;
            font-weight: 850;
            text-transform: uppercase;
        }

        .ops-field-value {
            min-width: 0;
            color: var(--ih-text);
            font-family: var(--ih-font-mono);
            font-size: 0.76rem;
            font-weight: 650;
            overflow-wrap: anywhere;
        }

        .ops-db-name {
            color: var(--ih-text);
            font-family: var(--ih-font-mono);
            font-size: 0.82rem;
            font-weight: 750;
        }

        .ops-date-stack {
            display: grid;
            gap: 0.12rem;
            color: var(--ih-text);
            font-family: var(--ih-font-mono);
            font-size: 0.78rem;
            font-weight: 650;
            white-space: nowrap;
            justify-content: center;
        }

        .ops-date-stack__time {
            color: var(--ih-muted-strong);
        }

        .ops-health-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.35rem;
            min-width: 0;
            width: 100%;
            max-width: 16rem;
            margin-inline: auto;
        }

        .ops-health-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            min-height: 1.45rem;
            padding: 0 0.5rem;
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.62);
            color: var(--ih-muted-strong);
            font-size: 0.72rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .ops-health-value {
            color: var(--ih-muted);
            font-weight: 750;
        }

        .ops-progress-cell {
            display: grid;
            justify-items: center;
            gap: 0.32rem;
            min-width: 12rem;
        }

        .ops-progress-note {
            color: var(--ih-muted-strong);
            font-size: 0.72rem;
            font-weight: 800;
        }

        .ops-progress-note.is-attention {
            color: #991b1b;
        }

        .ops-deploy-icon-btn {
            --ih-btn-bg: rgba(255, 255, 255, 0.72);
            --ih-btn-border: rgba(30, 64, 175, 0.22);
            --ih-btn-color: #1e40af;
            --ih-btn-hover: #dbeafe;
            width: 1.9rem;
            min-width: 1.9rem;
            min-height: 1.9rem;
            border-radius: 7px;
            box-shadow: none;
            opacity: 0.78;
        }

        .ops-deploy-icon-btn svg {
            width: 0.95rem;
            height: 0.95rem;
        }

        .ops-deploy-icon-btn:hover,
        .ops-deploy-icon-btn:focus-visible {
            opacity: 1;
        }

        .ih-timeline {
            border-radius: 8px;
        }

        .ih-timeline--dense {
            min-width: 11.5rem;
            padding: 0.6rem;
            border-color: rgba(148, 163, 184, 0.24);
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
        }

        .ih-timeline__track {
            border-radius: 6px;
        }

        .ih-timeline__segment {
            height: 0.95rem;
            border-radius: 4px;
        }

        .ih-tooltip__bubble {
            z-index: calc(var(--ih-z-modal) + 1);
        }

        #timeline-modal .ih-timeline__segment[data-ih-tooltip]::before,
        #timeline-modal .ih-timeline__segment--noted::before {
            content: "";
            position: absolute;
            top: 0.18rem;
            right: 0.22rem;
            width: 0.32rem;
            height: 0.32rem;
            border-radius: 999px;
            background: #facc15;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.18);
        }

        .ih-timeline__axis {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            margin-bottom: 0.35rem;
            padding-left: 0.2rem;
            color: #475569;
            font-size: 0.72rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .ih-timeline__axis span {
            text-align: center;
        }

        .ih-timeline__axis span:first-child {
            text-align: left;
        }

        .ih-timeline__axis span:last-child {
            text-align: right;
        }

        .ih-job-list {
            min-width: 13.5rem;
        }

        .ih-job-row,
        .ih-job-row-static {
            grid-template-columns: 5.8rem minmax(4.5rem, 1fr);
            min-height: 1.7rem;
            padding: 0 0.25rem;
        }

        .ih-job-row,
        .ih-job-row-static {
            display: grid;
            align-items: center;
            gap: var(--ih-space-2);
            border-radius: var(--ih-radius-sm);
        }

        .ih-job-row {
            color: inherit;
            text-decoration: none;
        }

        .ih-job-row:hover {
            background: rgba(255, 255, 255, 0.58);
            text-decoration: none;
        }

        .ih-job-row-static {
            opacity: 0.9;
        }

        .ih-job-label {
            color: #25324a;
            letter-spacing: 0;
        }

        .ih-job-time {
            color: var(--ih-muted-strong);
            font-family: var(--ih-font-mono);
            font-size: 0.72rem;
            font-weight: 650;
            white-space: nowrap;
        }

        .ops-empty {
            padding: 1.2rem;
            border: 1px dashed var(--ih-border-strong);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.68);
            color: var(--ih-muted-strong);
            font-weight: 650;
        }

        .ih-modal {
            background: rgba(15, 23, 42, 0.42);
        }

        .ih-modal__dialog {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .ih-modal__header {
            position: relative;
            display: grid;
            gap: 0.55rem;
            padding: 1.45rem 4.25rem 1.1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
        }

        .ih-modal__body {
            min-height: 0;
            overflow: auto;
            padding: 1rem 1.5rem 1.25rem;
            background: #ffffff;
        }

        .ih-modal__actions,
        .ih-modal__footer {
            margin: 0;
            padding: 1rem 1.5rem;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .ih-modal__footer .ih-alert {
            box-shadow: none;
        }

        .ih-modal__description {
            font-size: 0.875rem;
            line-height: 1.45;
        }

        .ih-modal__close {
            width: 2rem;
            min-width: 2rem;
            min-height: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 7px;
            background: #f8fafc;
            color: #475569;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        .ih-modal__close svg {
            width: 1rem;
            height: 1rem;
            pointer-events: none;
        }

        .ih-modal__close:hover,
        .ih-modal__close:focus-visible {
            background: #eef2f7;
            color: #172033;
        }

        @media (max-width: 1100px) {
            .ops-header-grid {
                grid-template-columns: 1fr;
            }

            .ih-dashboard-header__top {
                align-items: flex-start;
                flex-direction: column;
            }

            .ih-dashboard-header__meta {
                justify-content: flex-start;
            }
        }

        @media (max-width: 860px) {
            .ih-dashboard-header {
                position: static;
            }

        }

        @media (max-width: 620px) {
            .ops-agent-list {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 2200px) {
            :root {
                --ih-container: 1760px;
            }

            html {
                font-size: 17px;
            }

            .ih-dashboard-header {
                padding-block: 1.35rem;
            }

            .ih-table {
                min-width: 1320px;
            }
        }

        @media (min-width: 3400px) {
            :root {
                --ih-container: 2360px;
            }

            html {
                font-size: 19px;
            }

            .ih-dashboard-header {
                padding-block: 1.55rem;
            }

            .ih-table {
                min-width: 1760px;
            }
        }
    </style>
</head>
<body>
<div class="ops-page">
    <main class="ih-main">
        <div class="ih-dashboard-header">
            <div class="ops-header-grid">
                <div class="ih-dashboard-header__top">
                    <div>
                        <p class="ih-kicker">STAR</p>
                        <h1 class="ih-title">Deployments status</h1>
                    </div>
                    <div class="ih-dashboard-header__meta">
                        <span>Deployments <strong id="deployment-age"></strong></span>
                        <span>DB restore <strong id="db-age"></strong></span>
                    </div>
                </div>
                <section class="ops-agent-panel" aria-labelledby="teamcity-agents-title">
                    <div class="ops-agent-panel__header">
                        <span class="ops-agent-panel__title" id="teamcity-agents-title">
                            <span class="ops-bad-icon" aria-hidden="true"></span>
                            TeamCity agents down
                        </span>
                        <span class="ops-agent-panel__meta" id="teamcity-agents-count"></span>
                    </div>
                    <div class="ops-agent-list" id="teamcity-agents"></div>
                </section>
            </div>
        </div>

        <div class="ih-container ih-stack ops-content" style="padding-bottom: 3rem;">
            <div id="ops-filter-panel"></div>
            <div id="environments"></div>
        </div>
    </main>
</div>

<div class="ih-modal" id="deploy-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="deploy-modal-title" aria-describedby="deploy-modal-desc">
    <div class="ih-modal__dialog">
        <div class="ih-modal__header">
            <button class="ih-modal__close ih-btn ih-icon-btn ih-btn--plain ih-btn--neutral" data-ih-modal-close aria-label="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M18 6 6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"></path>
                </svg>
            </button>
            <h2 class="ih-modal__title" id="deploy-modal-title">Deploy environment</h2>
            <p class="ih-modal__description" id="deploy-modal-desc">Select the source branch for the deployment request.</p>
        </div>
        <div class="ih-modal__body ih-modal__content ih-stack">
            <div class="ops-deploy-summary">
                <span>Environment <strong id="deploy-env-name"></strong></span>
                <span>Server <strong id="deploy-server-name"></strong></span>
                <span>Validation is unavailable until the deployment gate is enabled.</span>
            </div>
            <label class="ih-field">
                <span class="ih-label">Branch</span>
                <select class="ih-input" id="deploy-branch">
                    <option value="release/68.0">release/68.0</option>
                    <option value="release/67.0">release/67.0</option>
                    <option value="main">main</option>
                    <option value="hotfix/db-restore">hotfix/db-restore</option>
                </select>
            </label>
        </div>
        <div class="ih-modal__actions">
            <button class="ih-btn ih-btn--outlined ih-btn--neutral" data-ih-modal-close>Cancel</button>
            <button class="ih-btn ih-btn--solid ih-btn--primary" id="deploy-submit-btn" disabled aria-disabled="true">Validate deployment</button>
        </div>
    </div>
</div>

    function compactDateTime(value) {
        if (!value || value === '-') return '<span class="ops-date-stack">-</span>';
        const [date, time = ''] = String(value).replace(',', '').split(' ');
        const shortTime = time ? time.split(':').slice(0, 2).join(':') : '';
        return `<span class="ops-date-stack">
            <span>${escapeHtml(date)}</span>
            ${shortTime ? `<span class="ops-date-stack__time">${escapeHtml(shortTime)} GMT</span>` : ''}
        </span>`;
    }

    function statusClass(status) {
        const map = { success: 'is-success', partial: 'is-partial', failure: 'is-failure', building: 'is-building', unknown: 'is-unknown' };
        return map[status] || '';
    }

    function segClass(status) {
        const map = {
            success: 'ih-timeline__segment--success',
            partial: 'ih-timeline__segment--warning',
            failure: 'ih-timeline__segment--danger',
            building: 'ih-timeline__segment--building',
            unknown: 'ih-timeline__segment--unknown'
        };
        return map[status] || 'ih-timeline__segment--unknown';
    }

    function statusLabel(status) {
        return status.charAt(0).toUpperCase() + status.slice(1);
    }

    function filterMatches(server) {
        if (filters.status !== 'all' && server.status !== filters.status) return false;
        const query = filters.query.trim().toLowerCase();
        if (!query) return true;
        const health = healthChecks(server).map(check => `${check.label} ${check.value}`).join(' ');
        return [server.name, server.star, server.polaris, server.echo, health, server.dbName, server.restore]
            .join(' ')
            .toLowerCase()
            .includes(query);
    }

    function renderFilterPanel() {
        document.getElementById('ops-filter-panel').innerHTML = `
            <div class="ops-filter-panel" aria-label="Deployment filters">
                <span class="ops-filter-panel__label">Filter servers</span>
                <div class="ops-filter-row" role="group" aria-label="Status filter">
                    ${[
                        ['all', 'All'],
                        ['failure', 'Failure'],
                        ['partial', 'Partial'],
                        ['building', 'Building'],
                        ['unknown', 'Unknown'],
                        ['success', 'Success']
                    ].map(([value, label]) => `
                        <button class="ih-btn ih-btn--outlined ih-btn--neutral ops-filter-btn" type="button" data-status-filter="${value}" aria-pressed="${filters.status === value}">${label}</button>
                    `).join('')}
                </div>
                <input class="ops-search" id="server-search" type="search" placeholder="Search server, release, DB name..." value="${escapeHtml(filters.query)}" aria-label="Search servers">
            </div>
        `;

        document.querySelectorAll('[data-status-filter]').forEach(button => {
            button.addEventListener('click', () => {
                filters.status = button.dataset.statusFilter;
                renderFilterPanel();
                renderEnvironments();
            });
        });

        document.getElementById('server-search').addEventListener('input', event => {
            filters.query = event.target.value;
            renderEnvironments();
        });
    }

    function statusIcon(status, label = statusLabel(status)) {
        return `<span class="ih-status-icon ih-status-icon--${status}" data-ih-tooltip="${label}" tabindex="0" aria-label="${label}"></span>`;
    }

    function worstStatus(statuses) {
        const priority = ['failure', 'building', 'partial', 'unknown', 'success'];
        return priority.find(status => statuses.includes(status)) || 'unknown';
    }

    function parseTimestamp(ts) {
        if (!ts || ts === '-' || ts === '...') return null;
        const [d, t] = ts.split(' ');
        const [dd, mmStr, yyyy] = d.split('-');
        const [hh, mi] = t.split(':');
        const mm = months.indexOf(mmStr.substring(0, 3).toUpperCase()) + 1;
        return new Date(yyyy, mm - 1, parseInt(dd), parseInt(hh), parseInt(mi)).getTime();
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function formatHour(timestamp) {
        const date = new Date(timestamp);
        return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function timelineHours(window) {
        if (!window) return '';
        const ticks = Array.from({ length: 5 }, (_, index) => {
            const timestamp = window.minTime + ((window.maxTime - window.minTime) * index / 4);
            return `<span>${formatHour(timestamp)}</span>`;
        }).join('');
        return `<div class="ih-timeline__axis" aria-label="Timeline hours">${ticks}</div>`;
    }

    function noteLabel(job) {
        if (!job.note) return '';
        return `${job.label} note ${job.note.at}: ${job.note.text}`;
    }

    function latestNote(jobs) {
        return jobs
            .filter(job => job.note)
            .sort((a, b) => parseTimestamp(b.note.at) - parseTimestamp(a.note.at))[0] || null;
    }

    function refreshFramework(root) {
        import('./dist/ihatefront.js').then(({ init }) => init(root));
    }

    function jobsFor(server) {
        const labels = { deployment: 'Deployment', services: 'Services', deprod: 'Deprod', hudson: 'Hudson' };
        return jobOrder.map(key => ({ key, label: labels[key], ...server.jobs[key] }));
    }

    function releaseCell(server) {
        return `<div class="ops-stack-cell">
            <span class="ops-field-line">
                <span class="ops-field-label">STAR</span>
                <span class="ops-field-value">${escapeHtml(server.star)}</span>
            </span>
            <span class="ops-field-line">
                <span class="ops-field-label">Polaris</span>
                <span class="ops-field-value">${escapeHtml(server.polaris)}</span>
            </span>
        </div>`;
    }

    function healthStatusFromValue(value) {
        const normalized = String(value || '').toLowerCase();
        if (['running', 'healthy', 'ok', 'up', 'online'].includes(normalized)) return 'success';
        if (['starting', 'building', 'pending'].includes(normalized)) return 'building';
        if (['degraded', 'warning', 'partial'].includes(normalized)) return 'partial';
        if (['failed', 'failure', 'down', 'error', 'stopped'].includes(normalized)) return 'failure';
        return 'unknown';
    }

    function healthChecks(server) {
        if (Array.isArray(server.health) && server.health.length) return server.health;
        return [{ label: 'Echo', value: server.echo }];
    }

    function runtimeCell(server) {
        return `<div class="ops-health-list">
            ${healthChecks(server).map(check => {
                const value = check.value || 'Unknown';
                const status = check.status || healthStatusFromValue(check.value);
                return `<span class="ops-health-pill" title="${escapeHtml(check.label)}: ${escapeHtml(value)}">
                    ${statusIcon(status, `${check.label}: ${value}`)}
                    ${escapeHtml(check.label)}
                    <span class="ops-health-value">${escapeHtml(value)}</span>
                </span>`;
            }).join('')}
        </div>`;
    }

    function databaseCell(server) {
        return `<div class="ops-stack-cell">
            <span class="ops-db-name">${escapeHtml(server.dbName)}</span>
            <span class="ops-field-line">
                <span class="ops-field-label">Restore</span>
                <span class="ops-field-value">${escapeHtml(server.restore)}</span>
            </span>
        </div>`;
    }

    function compactJobTime(job) {
        if (job.start === '-' || !job.end || job.end === '-') return '-';
        const startTime = job.start.split(' ')[1] || job.start;
        const endTime = job.end === '...' ? '...' : (job.end.split(' ')[1] || job.end);
        return `${startTime} - ${endTime}`;
    }

    function progressSummary(server) {
        const jobs = jobsFor(server);
        const attention = jobs.find(job => ['failure', 'building', 'partial'].includes(job.status));
        if (attention) {
            return {
                text: `${attention.label} ${attention.status}`,
                attention: ['failure', 'partial'].includes(attention.status)
            };
        }
        if (jobs.every(job => job.status === 'success')) return { text: 'Complete', attention: false };
        return { text: statusLabel(server.status), attention: server.status !== 'success' };
    }

    function jobsColumn(server) {
        const jobs = jobsFor(server);
        const rows = jobs.map(j => {
            const icon = statusIcon(j.status, statusLabel(j.status));
            const ts = compactJobTime(j);
            const content = `
                <span class="ih-job-label">${icon}${j.label}</span>
                <span class="ih-job-time">${ts}</span>`;
            if (!j.link || j.link === '#') {
                return `<div class="ih-job-row-static">${content}</div>`;
            }
            return `<a class="ih-job-row" href="${j.link}" target="_blank" rel="noopener" aria-label="Open ${j.label} details">${content}</a>`;
        }).join('');
        return `<div class="ih-job-list">${rows}</div>`;
    }

    function resolveTimelineWindow(jobs) {
        const times = jobs.map(j => ({ ...j, ts: parseTimestamp(j.start) })).filter(j => j.ts != null);
        if (times.length === 0) return null;
        const allTimes = times.map(j => j.ts).concat(jobs.map(j => parseTimestamp(j.end)).filter(Boolean));
        const minTime = Math.min(...allTimes);
        const maxTime = Math.max(...allTimes);
        return {
            minTime,
            maxTime: maxTime > minTime ? maxTime : minTime + 60 * 60 * 1000
        };
    }

    function dominantStatus(statuses) {
        const priority = ['failure', 'building', 'partial', 'success', 'unknown'];
        return priority.find(status => statuses.includes(status)) || 'unknown';
    }

    function timelineSlots(jobs, label, sharedWindow, options = {}) {
        const window = sharedWindow || resolveTimelineWindow(jobs);
        if (!window) return '<span class="ih-text-muted">-</span>';

        const slotWidth = (window.maxTime - window.minTime) / timelineSlotCount;
        const slots = Array.from({ length: timelineSlotCount }, (_, index) => {
            const slotStart = window.minTime + index * slotWidth;
            const slotEnd = slotStart + slotWidth;
            const overlaps = jobs.filter(j => {
                const start = parseTimestamp(j.start);
                if (!start) return false;
                const end = parseTimestamp(j.end) || window.maxTime;
                return start < slotEnd && end > slotStart;
            });
            const status = dominantStatus(overlaps.map(j => j.status));
            const title = overlaps.length
                ? `${label} slot ${index + 1}: ${overlaps.map(j => `${j.label} ${j.status}`).join(', ')}`
                : `${label} slot ${index + 1}: no activity`;
            const note = options.notes ? overlaps.find(j => j.note) : null;
            const noteAttr = note ? ` data-ih-tooltip="${escapeHtml(noteLabel(note))}" tabindex="0"` : '';
            const noteClass = note ? ' ih-timeline__segment--noted' : '';
            return `<span class="ih-timeline__segment ${segClass(status)}${noteClass}" title="${escapeHtml(title)}"${noteAttr}></span>`;
        }).join('');

        return slots;
    }

    function timelineCell(server) {
        const jobs = jobsFor(server);
        const summary = progressSummary(server);
        return `<div class="ops-progress-cell">
            <div class="ih-timeline ih-timeline--dense" style="cursor:pointer;" data-ih-timeline-server="${server.name}" data-ih-timeline-env="${findEnvByName(server)}">
                <div class="ih-timeline__track ih-timeline__track--slots" aria-label="${server.name} deployment timeline">${timelineSlots(jobs, server.name)}</div>
            </div>
            <span class="ops-progress-note${summary.attention ? ' is-attention' : ''}">${escapeHtml(summary.text)}</span>
        </div>`;
    }

    function deployButton(envName, serverName) {
        return `<button class="ih-btn ih-icon-btn ih-btn--plain ops-deploy-icon-btn" type="button" data-deploy-env="${envName}" data-deploy-server="${serverName}" title="Deploy ${serverName}" aria-label="Deploy ${serverName}">

                <path d="M12 3v12m0-12 4 4m-4-4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
        </button>`;
    }

    function findEnvByName(server) {
        return environments.find(e => e.servers.some(s => s.name === server.name))?.name || '';
    }

    function renderTeamcityAgents() {
        document.getElementById('teamcity-agents-count').textContent = `${teamcityAgentsDown.length} disconnected`;
        document.getElementById('teamcity-agents').innerHTML = teamcityAgentsDown.map(agent => `
            <span class="ops-agent-item">
                <span class="ops-bad-icon" aria-hidden="true"></span>
                ${agent}
            </span>
        `).join('');
    }

    function envHeader(env) {
        return `<div class="ih-env-header">
            <h2 class="ih-heading">${env.name} environment</h2>
        </div>`;
    }

    function environmentTableColgroup() {
        return `<colgroup>
            ${environmentTableColumns.map(column => `<col data-column="${column.key}" style="width: ${column.width};">`).join('')}
        </colgroup>`;
    }

    function environmentTableHeader() {
        return `<tr>
            ${environmentTableColumns.map(column => `<th scope="col">${column.label}</th>`).join('')}
        </tr>`;
    }

    function renderEnvironments() {
        const sections = environments.map(env => {
            const visibleServers = env.servers.filter(filterMatches);
            if (visibleServers.length === 0) {
                return `<section class="ih-section">
                    ${envHeader(env)}
                    <div class="ops-empty">No ${env.name} servers match the current filter.</div>
                </section>`;
            }
            return `<section class="ih-section">
                ${envHeader(env)}
                <div>
                    <div class="ih-table-wrap" tabindex="0" aria-label="${env.name} server deployment table">
                        <table class="ih-table ih-table--dense ih-status-table">
                            ${environmentTableColgroup()}
                            <thead>
                                ${environmentTableHeader()}
                            </thead>
                            <tbody>
                                ${visibleServers.map(server => `
                                    <tr class="${statusClass(server.status)}">
                                        <td>
                                            <div class="ops-server-cell">
                                                <span class="ih-server-name">${statusIcon(server.status)}${server.name}</span>
                                                ${deployButton(env.name, server.name)}
                                            </div>
                                        </td>
                                        <td>${releaseCell(server)}</td>
                                        <td>${runtimeCell(server)}</td>
                                        <td>${databaseCell(server)}</td>
                                        <td>${compactDateTime(server.started)}</td>
                                        <td>${timelineCell(server)}</td>
                                        <td>${jobsColumn(server)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>`;
        }).join('');

        document.getElementById('environments').innerHTML = sections;

        document.querySelectorAll('[data-ih-timeline-server]').forEach(el => {
            el.addEventListener('click', () => openServerTimelineModal(el.dataset.ihTimelineServer, el.dataset.ihTimelineEnv));
        });
        document.querySelectorAll('[data-deploy-env]').forEach(button => {
            button.addEventListener('click', () => openDeployModal(button.dataset.deployEnv, button.dataset.deployServer));
        });
        refreshFramework(document.getElementById('environments'));
    }

    function render() {
        renderFilterPanel();
        renderEnvironments();
        renderTeamcityAgents();
    }

    function timeAgo(timestamp) {
        const seconds = Math.max(0, Math.round((Date.now() - timestamp) / 1000));
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + ' minute' + (minutes === 1 ? '' : 's') + ' ago';
        const hours = Math.floor(minutes / 60);
        return hours + ' hour' + (hours === 1 ? '' : 's') + ' ago';
    }

    function refreshAges() {
        document.getElementById('deployment-age').textContent = timeAgo(pageLoadedAt - 13 * 60 * 1000);
        document.getElementById('db-age').textContent = timeAgo(pageLoadedAt - 26 * 60 * 1000);
    }

    function calcDuration(start, end) {
        if (start === '-' || end === '-') return '-';
        const [d1, t1] = start.split(' ');
        const [d2, t2] = end.split(' ');
        const [dd1, mm1, yyyy1] = d1.split('-').map((p, i) => i === 1 ? months.indexOf(p.substring(0, 3).toUpperCase()) + 1 : p);
        const [dd2, mm2, yyyy2] = d2.split('-').map((p, i) => i === 1 ? months.indexOf(p.substring(0, 3).toUpperCase()) + 1 : p);
        const s1 = new Date(yyyy1, mm1 - 1, parseInt(dd1), ...t1.split(':').map(Number));
        const s2 = new Date(yyyy2, mm2 - 1, parseInt(dd2), ...t2.split(':').map(Number));
        const diff = Math.round((s2 - s1) / 60000);
        if (diff < 60) return diff + 'm';
        return Math.floor(diff / 60) + 'h ' + (diff % 60) + 'm';
    }

    function findEnv(name) {
        return environments.find(e => e.name === name);
    }

    function findServer(serverName) {
        for (const env of environments) {
            const srv = env.servers.find(s => s.name === serverName);
            if (srv) return { server: srv, env };
        }
        return null;
    }

    function openDeployModal(envName, serverName) {
        const modal = document.getElementById('deploy-modal');
        document.getElementById('deploy-modal-title').textContent = `Deploy ${serverName}`;
        document.getElementById('deploy-env-name').textContent = envName;
        document.getElementById('deploy-server-name').textContent = serverName;
        document.getElementById('deploy-branch').value = envName === 'DEV' ? 'release/68.0' : 'release/67.0';
        modal.setAttribute('data-ih-open', '');
        modal.setAttribute('aria-hidden', 'false');
    }

    function openServerTimelineModal(serverName, envName) {
        const result = findServer(serverName);
        if (!result) return;
        const { server, env } = result;

        const modal = document.getElementById('timeline-modal');
        document.getElementById('timeline-modal-title').textContent = `${envName} / ${serverName} - Job timeline`;
        document.getElementById('timeline-modal-desc').textContent = `4 jobs | Click a stage link for build details`;

        const jobs = jobsFor(server);
        const timelineWindow = resolveTimelineWindow(jobs);

        const chart = document.getElementById('timeline-modal-chart');
        if (!timelineWindow) {
            chart.innerHTML = '<p class="ih-text-muted">No job data available</p>';
        } else {
            const rows = jobs.map(j => {
                const slots = timelineSlots([j], `${serverName} ${j.label}`, timelineWindow, { notes: true });
                return `<div class="ih-timeline__row">
                    <span class="ih-timeline__row-label">${j.label}</span>
                    <div class="ih-timeline__scroll">
                        <div class="ih-timeline__track ih-timeline__track--slots">${slots}</div>
                    </div>
                </div>`;
            }).join('');
            chart.innerHTML = `${timelineHours(timelineWindow)}
            <div class="ih-timeline__rows">${rows}</div>
            <div class="ih-timeline__legend">
                <span class="ih-timeline__legend-item ih-timeline__legend-item--success">success</span>
                <span class="ih-timeline__legend-item ih-timeline__legend-item--warning">partial</span>
                <span class="ih-timeline__legend-item ih-timeline__legend-item--building">building</span>
                <span class="ih-timeline__legend-item ih-timeline__legend-item--danger">failure</span>
                <span class="ih-timeline__legend-item ih-timeline__legend-item--unknown">unknown</span>
            </div>`;
        }
        refreshFramework(chart);

        const note = latestNote(jobs);
        const notePanel = document.getElementById('timeline-last-note');
        notePanel.innerHTML = note ? `
            <div class="ih-alert ih-alert--primary">
                <span class="ih-alert__icon">i</span>
                <div class="ih-alert__content">
                    <strong class="ih-alert__title">Last note - ${escapeHtml(note.label)} - ${escapeHtml(note.note.at)}</strong>
                    <p class="ih-alert__message">${escapeHtml(note.note.text)} (${escapeHtml(note.note.author)})</p>
                </div>
            </div>
        ` : `
            <div class="ih-alert ih-alert--primary">
                <span class="ih-alert__icon">i</span>
                <div class="ih-alert__content">
                    <strong class="ih-alert__title">Last note</strong>
                    <p class="ih-alert__message">No note recorded for ${escapeHtml(envName)} / ${escapeHtml(serverName)}.</p>
                </div>
            </div>
        `;

        modal.setAttribute('data-ih-open', '');
        modal.setAttribute('aria-hidden', 'false');
    }

    render();
    refreshAges();
    setInterval(refreshAges, 30000);
</script>
</body>
</html>
